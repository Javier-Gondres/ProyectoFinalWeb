<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0d1219" />
  <title>Registro — Encuesta OP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/estilo.css" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">
      <span class="brand-mark">OP</span>
      <span class="brand-text">Encuesta<span class="brand-sub">Nueva cuenta</span></span>
    </a>
    <div class="header-tools">
      <div id="sessionSlot" class="session-slot" hidden>
        <span class="session-slot__user" id="sessionUserName"></span>
        <span class="session-slot__rol" id="sessionUserRol"></span>
      </div>
      <nav class="nav-links" aria-label="Principal">
        <a class="nav-link" href="/">Inicio</a>
        <a class="nav-link" href="/grpc-web/index.html" id="navGrpc" hidden>gRPC</a>
        <a class="nav-link" href="/login.html" id="navLogin">Entrar</a>
        <a class="nav-link" href="/admin-usuarios.html" id="navAdmin" hidden>Administración</a>
        <a class="nav-link nav-link--active" href="/registro.html">Registro</a>
      </nav>
    </div>
  </header>
  <main>
    <h1 class="page-title">Crear cuenta</h1>
    <p class="page-lead">Registre un usuario encuestador; luego podrá guardar formularios y sincronizarlos.</p>
    <div class="card auth-card">
      <p class="card-title">Datos</p>
      <form id="f">
        <label>Usuario<input name="username" required minlength="3" autocomplete="username" /></label>
        <label>Contraseña<input name="password" type="password" required minlength="6" autocomplete="new-password" /></label>
        <label>Nombre visible <span style="font-weight:400;color:var(--text-muted)">(opcional)</span><input name="nombre" autocomplete="name" /></label>
        <button type="submit">Registrarme</button>
      </form>
      <div id="msg"></div>
      <p class="auth-footer">¿Ya tiene cuenta? <a href="/login.html">Iniciar sesión</a></p>
    </div>
  </main>
  <footer class="site-footer">Encuesta OP</footer>
  <script type="module">
    import { guardarToken } from "/js/auth.js";
    import { apiJson } from "/js/api.js";

    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.innerHTML = "";
      const fd = new FormData(e.target);
      const body = {
        username: fd.get("username"),
        password: fd.get("password"),
        nombre: fd.get("nombre") || undefined,
      };
      try {
        const data = await apiJson("/api/auth/registro", { method: "POST", body });
        guardarToken(data.token);
        msg.innerHTML = '<div class="msg ok">Cuenta creada. Redirigiendo…</div>';
        setTimeout(() => (location.href = "/encuesta.html"), 600);
      } catch (err) {
        msg.innerHTML = '<div class="msg err">' + (err.message || "Error") + "</div>";
      }
    });
  </script>
  <script type="module">
    import { initSessionHeader } from "/js/nav-session.js";
    initSessionHeader();
  </script>
</body>
</html>
