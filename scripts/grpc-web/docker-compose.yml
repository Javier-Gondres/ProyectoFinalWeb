# Raiz del repo para correr localmente: docker compose -f scripts/grpc-web/docker-compose.yml up -d
services:
  grpcweb-envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "127.0.0.1:7080:7080"
      - "127.0.0.1:9901:9901"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
